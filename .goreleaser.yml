version: 2

project_name: bb

builds:
  - main: .
    binary: bb
    ldflags:
      - -s -w
      - -X github.com/tyrantkhan/bb/cmd.Version={{.Version}}
      - -X github.com/tyrantkhan/bb/cmd.BuildDate={{.Date}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "checksums.txt"

changelog:
  disable: true

notarize:
  macos:
    - enabled: '{{ isEnvSet "MACOS_SIGN_P12" }}'
      sign:
        certificate: "{{.Env.MACOS_SIGN_P12}}"
        password: "{{.Env.MACOS_SIGN_PASSWORD}}"
      notarize:
        issuer_id: "{{.Env.MACOS_NOTARY_ISSUER_ID}}"
        key_id: "{{.Env.MACOS_NOTARY_KEY_ID}}"
        key: "{{.Env.MACOS_NOTARY_KEY}}"
        wait: true
        timeout: 20m

homebrew_casks:
  - name: bb
    binaries:
      - bb
    directory: Casks
    repository:
      owner: tyrantkhan
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    url:
      template: "https://github.com/tyrantkhan/bitbucket-cli/releases/download/{{ .Tag }}/{{ .ArtifactName }}"
      verified: "github.com/tyrantkhan/bitbucket-cli/"
    homepage: "https://github.com/tyrantkhan/bitbucket-cli"
    description: "Bitbucket Cloud CLI"
