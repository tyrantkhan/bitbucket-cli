version: "2"

linters:
  default: none
  enable:
    - govet
    - gocritic
    - gofmt
    - unused
    - ineffassign
    - bodyclose
    - nilerr
    - errcheck
    - staticcheck
    - gosimple

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - bodyclose
          - errcheck
